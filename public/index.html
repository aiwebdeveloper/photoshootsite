<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e9c89f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VisionForge Studio" />
    <title>VisionForge Studio — AI Media Creation</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="ambient ambient--left"></div>
    <div class="ambient ambient--right"></div>

    <div class="app-container">
      <!-- Top Bar -->
      <header class="studio-header panel">
        <div class="header__brand">
          <div class="brand-mark">VF</div>
          <h1>VisionForge Studio</h1>
        </div>

        <nav class="studio-modes">
          <button class="mode-button mode-button--active" data-mode="edit">EDIT</button>
          <button class="mode-button" data-mode="animate">ANIMATE</button>
          <button class="mode-button" data-mode="preview">PREVIEW</button>
        </nav>

        <div class="header__actions">
          <button type="button" class="ghost ghost--sm install-button" id="installAppButton" hidden>
            Install
          </button>
          <div id="configStatus" class="status-strip">Loading...</div>
        </div>
      </header>

      <!-- Main Canvas Area -->
      <main class="studio-workspace">
        <!-- Canvas with Tool Overlays -->
        <section class="canvas-container panel">
          <div class="canvas-toolbar">
            <button class="tool-button" title="Select">
              <span class="tool-icon">👆</span>
              <span class="tool-label">Select</span>
            </button>
            <button class="tool-button" title="Draw">
              <span class="tool-icon">✏️</span>
              <span class="tool-label">Draw</span>
            </button>
            <button class="tool-button" title="Shape">
              <span class="tool-icon">⬜</span>
              <span class="tool-label">Shape</span>
            </button>
            <button class="tool-button" title="Mask">
              <span class="tool-icon">🎭</span>
              <span class="tool-label">Mask</span>
            </button>
            <button class="tool-button" title="Layer">
              <span class="tool-icon">📚</span>
              <span class="tool-label">Layer</span>
            </button>
          </div>

          <div class="canvas-display">
            <div id="canvasPreview" class="canvas-main"></div>
            <div class="canvas-props">
              <div class="prop-row">
                <label>Scale: <input type="text" value="1.2x" class="prop-input" /></label>
              </div>
              <div class="prop-row">
                <label>Opacity: <input type="text" value="85%" class="prop-input" /></label>
              </div>
              <div class="prop-row">
                <input type="color" value="#d09e73" class="prop-color" />
              </div>
            </div>
          </div>
        </section>

        <!-- Control Panel -->
        <aside class="control-panel">
          <!-- EDIT Mode Controls -->
          <section id="editMode" class="mode-section mode-section--active">
            <div class="section-title">Photoshoot Batch Editor</div>
            
            <div class="tool-cluster">
              <div class="cluster-head">Input</div>
              <label>
                Upload images
                <input id="photoshootUpload" type="file" accept="image/*" multiple />
              </label>
              <label>
                Background image
                <input id="photoshootBackgroundImage" type="file" accept="image/*" />
              </label>
            </div>

            <div class="tool-cluster">
              <div class="cluster-head">Direction</div>
              <label>
                AI edit instructions
                <textarea
                  id="photoshootInstructions"
                  placeholder="Background remove kr do, white luxury background add kr do, size 1200x1500 kr do..."
                ></textarea>
              </label>
              <div class="checkbox-group">
                <label class="checkbox-label">
                  <input id="photoshootRemoveBg" type="checkbox" />
                  Remove background
                </label>
                <label class="checkbox-label">
                  <input id="photoshootMaintainColors" type="checkbox" checked />
                  Maintain real colors
                </label>
                <label class="checkbox-label">
                  <input id="photoshootAutoApplyInstructions" type="checkbox" checked />
                  Parse instructions
                </label>
              </div>
            </div>

            <div class="tool-cluster">
              <div class="cluster-head">Canvas</div>
              <div class="row-2">
                <label>
                  Background mode
                  <select id="photoshootBackgroundMode">
                    <option value="transparent">Transparent</option>
                    <option value="solid">Solid color</option>
                    <option value="gradient">Gradient</option>
                    <option value="image">Background image</option>
                  </select>
                </label>
                <label>
                  BG Color
                  <input id="photoshootBgColor" type="color" value="#ffffff" />
                </label>
              </div>
              <div class="row-3">
                <label>
                  Width
                  <input id="photoshootWidth" type="number" min="256" step="64" placeholder="1200" />
                </label>
                <label>
                  Height
                  <input id="photoshootHeight" type="number" min="256" step="64" placeholder="1500" />
                </label>
                <label>
                  Format
                  <select id="photoshootFormat">
                    <option value="png">PNG</option>
                    <option value="jpeg">JPEG</option>
                    <option value="webp">WEBP</option>
                  </select>
                </label>
              </div>
            </div>

            <div class="actions">
              <button type="button" id="applyPhotoshootBatch">Apply to batch</button>
              <button type="button" class="ghost" id="downloadPhotoshootBatch">Download all</button>
            </div>

            <div class="results-section">
              <div class="results-head">Queued shots</div>
              <div id="photoshootBatchGrid" class="batch-grid"></div>
            </div>
            <div class="results-section">
              <div class="results-head">Processed</div>
              <div id="photoshootResultsGrid" class="batch-grid"></div>
            </div>
          </section>

          <!-- ANIMATE Mode Controls -->
          <section id="animateMode" class="mode-section">
            <div class="section-title">Motion Lab</div>
            
            <form id="videoForm">
              <div class="tool-cluster">
                <div class="cluster-head">Animation Notes</div>
                <label>
                  <textarea
                    id="videoPrompt"
                    rows="3"
                    placeholder="soft luxury motion, realistic fabric, premium studio light"
                  ></textarea>
                </label>
              </div>

              <div class="tool-cluster">
                <div class="cluster-head">Parameters</div>
                <div class="row-2">
                  <label>
                    Product type
                    <select id="videoProductType">
                      <option value="undergarments">Undergarments</option>
                      <option value="cosmetics">Cosmetics</option>
                      <option value="fashion">Fashion</option>
                      <option value="jewelry">Jewelry</option>
                    </select>
                  </label>
                  <label>
                    Style
                    <select id="videoStyle">
                      <option value="product reveal">Product Reveal</option>
                      <option value="360 showcase">360 Showcase</option>
                      <option value="fabric movement">Fabric Movement</option>
                    </select>
                  </label>
                </div>
                <div class="row-2">
                  <label>
                    Duration
                    <select id="videoDuration">
                      <option value="15">15s</option>
                      <option value="30">30s</option>
                      <option value="60">1m</option>
                    </select>
                  </label>
                  <label>
                    Motion
                    <select id="motionStrength">
                      <option value="low">Low</option>
                      <option value="medium">Medium</option>
                      <option value="high">High</option>
                    </select>
                  </label>
                </div>
              </div>

              <div class="actions">
                <button type="submit">Generate Video</button>
                <button type="button" class="ghost" id="enhanceVideoPrompt">Preview</button>
              </div>

              <label>
                Animation source
                <input id="videoInputImage" type="file" accept="image/*" />
              </label>
              <div id="videoSourcePreview" class="source-preview">No source selected</div>
            </form>
          </section>

          <!-- PREVIEW Mode -->
          <section id="previewMode" class="mode-section">
            <div class="section-title">Preview & Export</div>
            
            <div class="tool-cluster">
              <div class="cluster-head">Output</div>
              <div id="enhancedPromptBox" class="enhanced-box">Preview will appear here</div>
              <div id="gallery" class="gallery"></div>
            </div>

            <div class="tool-cluster">
              <div class="cluster-head">360 Space</div>
              <label>
                Load panorama
                <input id="panoramaInput" type="file" accept="image/*" />
              </label>
              <div class="actions">
                <button type="button" id="startSpin">Auto rotate</button>
                <button type="button" class="ghost" id="recordSpin">Record</button>
              </div>
              <div id="panoramaViewer" class="viewer"></div>
            </div>

            <div class="tool-cluster">
              <div class="cluster-head">History</div>
              <div id="historyGrid" class="history-grid"></div>
              <div class="actions">
                <button type="button" class="ghost ghost--sm" id="clearAllHistory">Clear</button>
                <button type="button" class="ghost ghost--sm" id="deleteSelectedHistory">Delete</button>
              </div>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
